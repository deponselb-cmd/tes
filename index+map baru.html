            ].map(([label,detail,pct,color])=>`<div><div class="flex justify-between text-[10px] mb-1"><span class="text-gray-400">${label}</span><span class="text-${color}-400">${detail}</span></div><div class="w-full bg-gray-700 rounded-full h-1.5"><div class="bg-${color}-500 h-1.5 rounded-full" style="width:${pct}"></div></div></div>`).join('')}</div></div>
          </div>
          <div class="bg-[#0f1629] rounded-xl border border-gray-800 p-5"><h3 class="text-sm font-semibold mb-4">Cache & Maintenance</h3><div class="grid grid-cols-3 gap-3">${['clear-cache','clear-route','clear-config','clear-view','clear-compiled','restart-queue'].map(a=>`<button onclick="performAdminAction('${a}')" class="p-3 bg-gray-800/50 hover:bg-gray-800 rounded-lg border border-gray-700 text-left transition"><p class="text-xs font-medium capitalize">${a.replace(/-/g,' ')}</p><p class="text-[10px] text-gray-500 mt-1">php artisan ${a}</p></button>`).join('')}</div></div>
          <div class="bg-[#0f1629] rounded-xl border border-gray-800 p-5"><h3 class="text-sm font-semibold mb-4">System Logs</h3><div class="bg-gray-900 rounded-lg p-4 font-mono text-[10px] text-gray-400 max-h-40 overflow-y-auto">${[
            '[2025-01-20 08:30:15] INFO: Backup completed successfully',
            '[2025-01-20 07:15:00] INFO: Invoice generation started for 2847 customers',
            '[2025-01-19 23:59:00] WARNING: High memory usage detected (78%)',
            '[2025-01-19 18:45:22] INFO: Payment gateway sync completed',
          ].map(l=>`<div class="py-0.5">${l}</div>`).join('')}</div></div>
        </div>`;
        }

        function initAdminPanel() { /* ready */ }

        function performAdminAction(action) {
            if (!confirm(`Run artisan ${action}?`)) return;
            showNotification(`Executed: php artisan ${action}`, 'success');
        }

        // ========== CUSTOMERS CRUD ==========
        function showAddCustomerModal(customerId = null) {
            const existing = customerId ? customersData.find(c => c.id === customerId) : null;
            const modal = document.createElement('div');
            modal.id = 'add-customer-modal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
        <div class="bg-[#0f1629] rounded-xl border border-gray-800 p-6 w-full max-w-2xl"><h3 class="text-lg font-bold mb-4">${existing ? 'Edit Customer' : 'Add Customer'}</h3>
          <form id="customer-form" onsubmit="return false">
            <input type="hidden" id="customer-id" value="${existing?.id || ''}">
            <div class="grid grid-cols-2 gap-4 mb-5">
              <div><label class="text-xs text-gray-400 block mb-1">Full Name *</label><input type="text" id="cust-fullname" value="${existing?.name || ''}" placeholder="John Doe" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white" required></div>
              <div><label class="text-xs text-gray-400 block mb-1">Phone *</label><input type="tel" id="cust-phone" value="${existing?.phone || ''}" placeholder="+62 8XX" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white" required></div>
              <div><label class="text-xs text-gray-400 block mb-1">Plan *</label><select id="cust-plan" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white" required><option value="">Select Plan</option><option value="Basic 10 Mbps" ${existing?.plan==='Basic 10 Mbps'?'selected':''}>Basic 10 Mbps</option><option value="Standard 30 Mbps" ${existing?.plan==='Standard 30 Mbps'?'selected':''}>Standard 30 Mbps</option><option value="Premium 50 Mbps" ${existing?.plan==='Premium 50 Mbps'?'selected':''}>Premium 50 Mbps</option></select></div>
              <div><label class="text-xs text-gray-400 block mb-1">Status</label><select id="cust-status" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white"><option value="active" ${existing?.status==='active'?'selected':''}>Active</option><option value="isolated" ${existing?.status==='isolated'?'selected':''}>Isolated</option><option value="pending" ${existing?.status==='pending'?'selected':''}>Pending</option></select></div>
            </div>
            <div class="mb-4"><label class="text-xs text-gray-400 block mb-1">Address</label><textarea id="cust-address" placeholder="Full address" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white h-20">${existing?.address || ''}</textarea></div>
            <div class="flex gap-2"><button onclick="saveCustomer()" class="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs">Save Customer</button><button onclick="document.getElementById('add-customer-modal').remove()" class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-xs">Cancel</button></div>
          </form></div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }

        function saveCustomer() {
            const id = document.getElementById('customer-id').value || 'cust-' + Date.now();
            const name = document.getElementById('cust-fullname').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const plan = document.getElementById('cust-plan').value;
            const status = document.getElementById('cust-status').value;
            const address = document.getElementById('cust-address').value.trim();
            if (!name || !phone || !plan) { showNotification('Please fill all required fields', 'error'); return; }
            const data = {
                id,
                name,
                phone,
                plan,
                status,
                address,
                pppoe: 'pppoe-' + name.toLowerCase().replace(/\s/g, ''),
                start_date: new Date().toISOString().split('T')[0],
                lat: null,
                lng: null,
                invoice_amount: plan.includes('50') ? 350000 : plan.includes('30') ? 250000 : 150000,
                invoice_status: 'pending'
            };
            const existing = customersData.findIndex(c => c.id === id);
            if (existing !== -1) customersData[existing] = { ...customersData[existing], ...data, id: customersData[
                    existing].id, start_date: customersData[existing].start_date };
            else customersData.push(data);
            localStorage.setItem('customersData', JSON.stringify(customersData));
            document.getElementById('add-customer-modal')?.remove();
            renderCustomersTable();
            updateCustomerStats();
            showNotification('Customer saved', 'success');
        }

        function renderCustomersTable() {
            const tbody = document.getElementById('customers-tbody');
            if (!tbody) return;
            tbody.innerHTML = customersData.length ? '' :
                '<tr><td colspan="7" class="text-center py-4 text-gray-500">No customers</td></tr>';
            customersData.forEach(c => {
                const badge = c.status === 'active' ? 'bg-emerald-500/20 text-emerald-300' : (c.status ===
                    'isolated' ? 'bg-red-500/20 text-red-300' : 'bg-amber-500/20 text-amber-300');
                tbody.innerHTML +=
                    `<tr class="border-b border-gray-800/50"><td class="py-2.5 px-2">${c.name}</td><td class="py-2.5 px-2">${c.plan}</td><td class="py-2.5 px-2 text-gray-400">${c.pppoe||'-'}</td><td class="py-2.5 px-2"><span class="${badge} px-2 py-0.5 rounded text-[10px]">${c.status}</span></td><td class="py-2.5 px-2 text-gray-400">${c.phone}</td><td class="py-2.5 px-2 text-right text-gray-400">${c.start_date||'-'}</td><td class="py-2.5 px-2 text-center"><button onclick="editCustomer('${c.id}')" class="text-indigo-400 text-xs mr-2">✏️</button><button onclick="deleteCustomer('${c.id}')" class="text-red-400 text-xs">🗑️</button></td></tr>`;
            });
        }

        function updateCustomerStats() {
            const totalEl = document.getElementById('cust-total');
            const activeEl = document.getElementById('cust-active');
            const isolatedEl = document.getElementById('cust-isolated');
            const pendingEl = document.getElementById('cust-pending');
            if (totalEl) totalEl.textContent = customersData.length;
            if (activeEl) activeEl.textContent = customersData.filter(c => c.status === 'active').length;
            if (isolatedEl) isolatedEl.textContent = customersData.filter(c => c.status === 'isolated').length;
            if (pendingEl) pendingEl.textContent = customersData.filter(c => c.status === 'pending').length;
        }

        function editCustomer(id) {
            const c = customersData.find(c => c.id === id);
            if (!c) return;
            showAddCustomerModal(id);
        }

        function deleteCustomer(id) {
            if (!confirm('Delete this customer?')) return;
            customersData = customersData.filter(c => c.id !== id);
            localStorage.setItem('customersData', JSON.stringify(customersData));
            renderCustomersTable();
            updateCustomerStats();
            showNotification('Customer deleted', 'success');
        }

        function exportCustomersCSV() {
            let csv = 'Name,Phone,Plan,Status,PPPoE,Start Date\n';
            customersData.forEach(c => csv +=
                `"${c.name}","${c.phone}","${c.plan}","${c.status}","${c.pppoe||''}","${c.start_date||''}"\n`);
            downloadBlob(csv, 'customers.csv', 'text/csv');
        }

        // ========== INVENTORY CRUD ==========
        function addInventoryItem() {
            const name = document.getElementById('inv-item-name')?.value.trim();
            const sku = document.getElementById('inv-sku')?.value.trim();
            if (!name || !sku) { showNotification('Item name and SKU required', 'error'); return; }
            const item = {
                id: 'item-' + Date.now(),
                item_name: name,
                sku: sku,
                category: document.getElementById('inv-category')?.value || 'Hardware',
                quantity: parseInt(document.getElementById('inv-quantity')?.value) || 0,
                unit_price: parseFloat(document.getElementById('inv-unit-price')?.value) || 0
            };
            inventoryItems.push(item);
            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            renderInventoryTable();
            updateInventoryStats();
            ['inv-item-name', 'inv-sku', 'inv-quantity', 'inv-unit-price'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            showNotification('Item added', 'success');
        }

        function renderInventoryTable() {
            const tbody = document.getElementById('inv-items-tbody');
            if (!tbody) return;
            tbody.innerHTML = inventoryItems.length ? '' :
                '<tr><td colspan="8" class="text-center py-4 text-gray-500">No items</td></tr>';
            inventoryItems.forEach(i => {
                const lowStock = i.quantity <= 10;
                tbody.innerHTML +=
                    `<tr class="border-b border-gray-800/50"><td class="py-2.5 px-2">${i.item_name}</td><td class="py-2.5 px-2 text-gray-400">${i.sku}</td><td class="py-2.5 px-2 text-gray-400">${i.category}</td><td class="py-2.5 px-2 text-right">${i.quantity}</td><td class="py-2.5 px-2 text-right">Rp ${i.unit_price.toLocaleString('id-ID')}</td><td class="py-2.5 px-2 text-right">Rp ${(i.quantity * i.unit_price).toLocaleString('id-ID')}</td><td class="py-2.5 px-2 text-center"><span class="${lowStock ? 'bg-red-500/20 text-red-300' : 'bg-emerald-500/20 text-emerald-300'} px-2 py-0.5 rounded text-[10px]">${lowStock ? '⚠ Low' : '✓ OK'}</span></td><td class="py-2.5 px-2 text-center"><button onclick="deleteInventoryItem('${i.id}')" class="text-red-400 text-xs">🗑️</button></td></tr>`;
            });
        }

        function updateInventoryStats() {
            const totalEl = document.getElementById('inv-total-items');
            const valueEl = document.getElementById('inv-total-value');
            const lowEl = document.getElementById('inv-low-stock');
            const salesEl = document.getElementById('inv-sales-today');
            if (totalEl) totalEl.textContent = inventoryItems.length;
            const totalValue = inventoryItems.reduce((s, i) => s + i.quantity * i.unit_price, 0);
            if (valueEl) valueEl.textContent = 'Rp ' + totalValue.toLocaleString('id-ID');
            if (lowEl) lowEl.textContent = inventoryItems.filter(i => i.quantity <= 10).length;
            if (salesEl) salesEl.textContent = 'Rp ' + todaysSales.reduce((s, sale) => s + sale.total, 0).toLocaleString(
                'id-ID');
        }

        function deleteInventoryItem(id) {
            if (!confirm('Delete this item?')) return;
            inventoryItems = inventoryItems.filter(i => i.id !== id);
            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            renderInventoryTable();
            updateInventoryStats();
            showNotification('Item deleted', 'success');
        }

        function exportInventoryCSV() {
            let csv = 'Item Name,SKU,Category,Quantity,Unit Price\n';
            inventoryItems.forEach(i => csv +=
                `"${i.item_name}","${i.sku}","${i.category}",${i.quantity},${i.unit_price}\n`);
            downloadBlob(csv, 'inventory.csv', 'text/csv');
        }

        function importInventoryCSV(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const rows = e.target.result.split('\n').slice(1);
                let count = 0;
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const name = (cols[0] || '').replace(/"/g, '').trim();
                    const sku = (cols[1] || '').replace(/"/g, '').trim();
                    if (name && sku) {
                        inventoryItems.push({
                            id: 'item-' + Date.now() + '-' + count,
                            item_name: name,
                            sku: sku,
                            category: (cols[2] || 'Hardware').replace(/"/g, '').trim(),
                            quantity: parseInt(cols[3]) || 0,
                            unit_price: parseFloat(cols[4]) || 0
                        });
                        count++;
                    }
                });
                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                renderInventoryTable();
                updateInventoryStats();
                showNotification(`Imported ${count} items`, 'success');
            };
            reader.readAsText(file);
        }

        // ========== POS ==========
        function switchInvTab(tab) {
            const invTab = document.getElementById('inv-inventory-tab');
            const posTab = document.getElementById('inv-pos-tab');
            if (invTab) invTab.classList.toggle('hidden', tab !== 'inventory');
            if (posTab) posTab.classList.toggle('hidden', tab !== 'pos');
            document.querySelectorAll('.inv-tab-btn').forEach(b => {
                b.classList.toggle('bg-indigo-500/20', b.dataset.tab === tab);
                b.classList.toggle('text-indigo-300', b.dataset.tab === tab);
                b.classList.toggle('bg-gray-700', b.dataset.tab !== tab);
                b.classList.toggle('text-gray-300', b.dataset.tab !== tab);
            });
            if (tab === 'inventory') { renderInventoryTable();
                updateInventoryStats(); }
            if (tab === 'pos') { renderPOSProducts();
                renderPOSCart();
                calculatePOSTotal();
                renderSalesHistory(); }
        }

        function renderPOSProducts() {
            const container = document.getElementById('pos-products-list');
            if (!container) return;
            const available = inventoryItems.filter(i => i.quantity > 0);
            container.innerHTML = available.length ? available.map(i => `
            <div onclick="addToCart('${i.id}')" class="p-3 bg-gray-800/50 rounded-lg cursor-pointer hover:bg-gray-800 border border-gray-700 transition">
              <div class="flex justify-between items-start"><p class="text-xs font-medium text-white">${i.item_name}</p><span class="text-[9px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-400">${i.quantity} left</span></div>
              <p class="text-sm font-bold text-emerald-400 mt-1">Rp ${i.unit_price.toLocaleString('id-ID')}</p>
            </div>`).join('') : '<p class="text-xs text-gray-500 text-center py-4">No products available</p>';
        }

        function addToCart(itemId) {
            const item = inventoryItems.find(i => i.id === itemId);
            if (!item || item.quantity <= 0) return;
            const existing = posCart.find(i => i.id === itemId);
            if (existing) { if (existing.qty < item.quantity) existing.qty++; } else posCart.push({ ...item,
                qty: 1 });
            renderPOSCart();
            calculatePOSTotal();
        }

        function renderPOSCart() {
            const container = document.getElementById('pos-cart-items');
            if (!container) return;
            container.innerHTML = posCart.length ? posCart.map((item, idx) => `
            <div class="p-2 bg-gray-800/50 rounded-lg flex justify-between items-center gap-2">
              <div class="flex-1"><p class="text-xs font-medium text-white">${item.item_name}</p><p class="text-[10px] text-gray-500">Rp ${item.unit_price.toLocaleString('id-ID')} × <input type="number" value="${item.qty}" min="1" max="${item.quantity}" class="w-12 bg-gray-700 border border-gray-600 rounded px-1 py-0.5 text-[10px] text-white" onchange="updateCartQty(${idx}, this.value)"></p></div>
              <div class="text-right"><p class="text-xs font-bold text-cyan-400">Rp ${(item.unit_price * item.qty).toLocaleString('id-ID')}</p></div>
              <button onclick="removeFromCart(${idx})" class="text-red-400 hover:text-red-300 text-xs">✕</button>
            </div>`).join('') : '<p class="text-xs text-gray-500 text-center py-4">Cart is empty</p>';
        }

        function updateCartQty(idx, qty) {
            const val = parseInt(qty);
            if (isNaN(val) || val < 1) { posCart[idx].qty = 1; } else if (val > posCart[idx].quantity) { posCart[idx]
                    .qty = posCart[idx].quantity; } else { posCart[idx].qty = val; }
            renderPOSCart();
            calculatePOSTotal();
        }

        function removeFromCart(idx) { posCart.splice(idx, 1);
            renderPOSCart();
            calculatePOSTotal(); }

        function calculatePOSTotal() {
            const subtotal = posCart.reduce((s, i) => s + i.unit_price * i.qty, 0);
            const discount = parseFloat(document.getElementById('pos-discount')?.value) || 0;
            const total = Math.max(0, subtotal - discount);
            const subtotalEl = document.getElementById('pos-subtotal');
            const totalEl = document.getElementById('pos-total');
            if (subtotalEl) subtotalEl.textContent = 'Rp ' + subtotal.toLocaleString('id-ID');
            if (totalEl) totalEl.textContent = 'Rp ' + total.toLocaleString('id-ID');
        }

        function clearPOSCart() { posCart = [];
            renderPOSCart();
            calculatePOSTotal(); }

        function completePOSSale() {
            if (!posCart.length) { showNotification('Cart is empty', 'error'); return; }
            const discount = parseFloat(document.getElementById('pos-discount')?.value) || 0;
            const subtotal = posCart.reduce((s, i) => s + i.unit_price * i.qty, 0);
            const total = Math.max(0, subtotal - discount);
            const methodEl = document.querySelector('input[name="payment-method"]:checked');
            const method = methodEl ? methodEl.value : 'cash';
            const sale = {
                id: 'sale-' + Date.now(),
                sale_id: 'SALE-' + Date.now().toString().slice(-8),
                time: new Date().toLocaleTimeString('id-ID'),
                total,
                method,
                discount
            };
            todaysSales.unshift(sale);
            posCart.forEach(ci => {
                const item = inventoryItems.find(i => i.id === ci.id);
                if (item) item.quantity = Math.max(0, item.quantity - ci.qty);
            });
            localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            localStorage.setItem('todaysSales', JSON.stringify(todaysSales));
            posCart = [];
            renderPOSCart();
            renderPOSProducts();
            updateInventoryStats();
            renderSalesHistory();
            calculatePOSTotal();
            const discEl = document.getElementById('pos-discount');
            if (discEl) discEl.value = '';
            showNotification('Sale completed! Total: Rp ' + total.toLocaleString('id-ID'), 'success');
        }

        function renderSalesHistory() {
            const tbody = document.getElementById('pos-sales-tbody');
            if (!tbody) return;
            tbody.innerHTML = todaysSales.length ? todaysSales.map(s => `
            <tr class="border-b border-gray-800/50"><td class="py-2.5 px-2">${s.sale_id}</td><td class="py-2.5 px-2 text-gray-400">${s.time}</td><td class="py-2.5 px-2 text-right text-emerald-400 font-medium">Rp ${s.total.toLocaleString('id-ID')}</td><td class="py-2.5 px-2"><span class="text-[10px] px-2 py-0.5 rounded bg-indigo-500/20 text-indigo-300">${s.method}</span></td><td class="py-2.5 px-2 text-center"><button onclick="printReceipt('${s.sale_id}')" class="text-cyan-400 text-xs hover:underline">🖨 Print</button></td></tr>`
            ).join('') : '<tr><td colspan="5" class="text-center py-4 text-gray-500">No sales today</td></tr>';
        }

        function printReceipt(saleId) {
            const sale = todaysSales.find(s => s.sale_id === saleId);
            if (!sale) return;
            const w = window.open('', '', 'width=350,height=500');
            w.document.write(`
        <html><head><style>body{font-family:monospace;padding:15px;font-size:12px;color:#000}hr{border:0;border-top:1px dashed #999}h3{text-align:center;margin:0}.total{font-size:16px;font-weight:bold}@media print{body{margin:0}}</style></head><body>
          <h3>RECEIPT</h3><p style="text-align:center">NetBill Pro</p><hr>
          <p>Sale ID: ${sale.sale_id}</p><p>Time: ${sale.time}</p><p>Method: ${sale.method.toUpperCase()}</p><hr>
          <p class="total">Total: Rp ${sale.total.toLocaleString('id-ID')}</p><hr><p style="text-align:center">Thank you!</p>
        </body></html>`);
            w.document.close();
            setTimeout(() => w.print(), 400);
        }

        // ========== HELPER ==========
        function downloadBlob(content, filename, type) {
            const blob = new Blob([content], { type });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ========== INISIALISASI ==========
        document.addEventListener('DOMContentLoaded', () => {
            seedDemoData();
            if (localStorage.getItem('app-theme') === 'light') {
                isDarkMode = false;
                document.body.classList.add('light-mode');
                const btnText = document.querySelector('#theme-btn');
                if (btnText) btnText.innerHTML = '<i data-lucide="sun" class="w-3 h-3"></i> Light';
            }
            switchPage('dashboard');
            lucide.createIcons();
        });
    </script>
</body>
</html>
